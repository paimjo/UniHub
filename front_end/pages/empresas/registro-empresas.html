<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Empresas | UniHub</title>
  <link rel="stylesheet" href="../../css/style.css" />
</head>

<body>
  <section class="fundo-registro">
    <div class="caixa-registro">
      <img src="../../imagens/unihub-logo.jpg" alt="UniHub Logo" class="registro-logo">

      <div class="form-etapa etapa-1 ativa">
        <h2>Crie a Conta da sua Empresa</h2>
        <form>
          <div class="caixa-input"><input type="text" required><label>Nome da Empresa</label></div>
          <div class="caixa-input"><input type="email" required><label>Email da Empresa</label></div>
          <div class="caixa-input"><input type="password" required><label>Palavra‑passe</label></div>
          <div class="caixa-input"><input type="password" required><label>Confirmar Palavra‑passe</label></div>
          <button type="button" class="btn proxima">Continuar</button>
        </form>
      </div>

      <div class="form-etapa etapa-2">
        <h2>Informações Pessoais</h2>
        <form>
          <div class="caixa-input"><input type="text" required><label>País</label></div>
          <div class="caixa-input"><input type="text" required><label>Código Postal</label></div>
          <div class="caixa-input"><input type="text" required><label>NIF/NIPC</label></div>
          <div class="caixa-input"><input type="tel" required><label>Contacto da Empresa</label></div>
          <div class="caixa-input"><input type="text" required><label>Morada</label></div>
          <button type="submit" class="btn finalizar">Concluir Registro</button>
          <button type="button" class="btn voltar">Voltar</button>
        </form>
      </div>

      <div class="voltar-link">
        <p><a href="../index.html">⟵ Voltar à página inicial</a></p>
      </div>
    </div>
  </section>

  <footer class="rodape">
    <p>Copyright © 2026 UniHub. Todos os direitos reservados.</p>
  </footer>

  <script src="../../js/registro-estudante.js"></script>
</body>
</html>
