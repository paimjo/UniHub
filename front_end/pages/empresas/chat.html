<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniHub | Mensagens</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6fb; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .chat-wrapper { display: flex; flex: 1; overflow: hidden; }
    .chat-sidebar { width: 300px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid #eee; }
    .sidebar-header h2 { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; }
    .sidebar-pesquisa { position: relative; }
    .sidebar-pesquisa input { width: 100%; padding: 9px 15px 9px 38px; border-radius: 20px; border: 1px solid #eee; background: #f4f6fb; font-size: 13px; outline: none; box-sizing: border-box; }
    .sidebar-pesquisa i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #aaa; }
    .lista-contactos { overflow-y: auto; flex: 1; }
    .contacto { display: flex; align-items: center; gap: 12px; padding: 14px 20px; cursor: pointer; transition: background 0.2s; border-bottom: 1px solid #f5f5f5; }
    .contacto:hover, .contacto.ativo { background: #f0f5ff; }
    .contacto-avatar { width: 42px; height: 42px; border-radius: 50%; background: #e8f0fe; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #2563eb; flex-shrink: 0; }
    .contacto-info { flex: 1; min-width: 0; }
    .contacto-info strong { font-size: 14px; color: #1a1a2e; display: block; }
    .contacto-info span { font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-cabecalho { padding: 16px 24px; background: #fff; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; }
    .chat-cabecalho .avatar { width: 38px; height: 38px; border-radius: 50%; background: #e8f0fe; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #2563eb; }
    .chat-cabecalho strong { font-size: 15px; color: #1a1a2e; }
    .chat-mensagens { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; background: #f4f6fb; }
    .msg { max-width: 65%; padding: 10px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
    .msg-recebida { background: #fff; color: #333; border-bottom-left-radius: 4px; align-self: flex-start; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .msg-enviada { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; }
    .msg-hora { font-size: 11px; opacity: 0.6; margin-top: 4px; }
    .chat-input-area { padding: 16px 24px; background: #fff; border-top: 1px solid #eee; display: flex; align-items: center; gap: 12px; }
    .chat-input-area input { flex: 1; padding: 11px 18px; border-radius: 24px; border: 1px solid #eee; background: #f4f6fb; font-size: 14px; outline: none; }
    .chat-input-area input:focus { border-color: #2563eb; }
    .btn-enviar { width: 42px; height: 42px; border-radius: 50%; background: #2563eb; border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-enviar:hover { background: #1e4db7; }
    .sem-conversa { flex: 1; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 15px; }
  </style>
</head>
<body>
  <header class="header-dashboard">
    <a href="home-estudante.html" class="logo"><img src="../../imagens/unihub-logo.jpg" alt="UniHub Logo"></a>
    <div class="barra-pesquisa"><input type="text" placeholder="Pesquisar vagas, empresas, IRS..."><i class="bx bx-search"></i></div>
     <nav class="menu-dashboard">
      <a href="#">Empregabilidade</a>
      <a href="#">Estágio</a>
      <a href="candidatos.html">Candidaturas</a>
    </nav>
    <div class="icones-dashboard">
      <a href="perfil.html"><i class="bx bx-user"></i></a>
      <a href="chat.html"><i class="bx bx-message"></i></a>
      <a href="notificacoes.html"><i class="bxf bx-bell"></i></a>
      <a href="favoritos.html"><i class="bx bx-plus"></i></a>
    </div>
  </header>

  <div class="chat-wrapper">
    <aside class="chat-sidebar">
      <div class="sidebar-header">
        <h2>Mensagens</h2>
        <div class="sidebar-pesquisa"><i class="bx bx-search"></i><input type="text" placeholder="Pesquisar..."></div>
      </div>
      <div class="lista-contactos" id="lista-contactos">
        <p style="padding:20px;color:#bbb;font-size:13px;">A carregar conversas...</p>
      </div>
    </aside>

    <div class="chat-area" id="chat-area">
      <div class="sem-conversa">Seleciona uma conversa para começar</div>
    </div>
  </div>

  <script>
    const BASE = 'http://localhost:3000/api';
    const token = localStorage.getItem('token');
    const utilizador = JSON.parse(localStorage.getItem('utilizador') || '{}');
    let outroIdAtivo = null;

    function hora(data) {
      return new Date(data).toLocaleTimeString('pt', {hour:'2-digit', minute:'2-digit'});
    }

    async function carregarConversas() {
      const res = await fetch(`${BASE}/chat`, { headers: { Authorization: 'Bearer ' + token } });
      const conversas = await res.json();
      const lista = document.getElementById('lista-contactos');
      if (!conversas.length) { lista.innerHTML = '<p style="padding:20px;color:#bbb;font-size:13px;">Sem conversas ainda.</p>'; return; }
      lista.innerHTML = conversas.map(c => `
        <div class="contacto" onclick="abrirConversa(${c.outro_id}, '${c.outro_nome}', this)">
          <div class="contacto-avatar"><i class="bx bx-user"></i></div>
          <div class="contacto-info">
            <strong>${c.outro_nome}</strong>
            <span>${c.ultima_mensagem || ''}</span>
          </div>
        </div>`).join('');
    }

    async function abrirConversa(outroId, outroNome, el) {
      outroIdAtivo = outroId;
      document.querySelectorAll('.contacto').forEach(c => c.classList.remove('ativo'));
      el.classList.add('ativo');

      const res = await fetch(`${BASE}/chat/${outroId}`, { headers: { Authorization: 'Bearer ' + token } });
      const msgs = await res.json();

      document.getElementById('chat-area').innerHTML = `
        <div class="chat-cabecalho">
          <div class="avatar"><i class="bx bx-user"></i></div>
          <div><strong>${outroNome}</strong></div>
        </div>
        <div class="chat-mensagens" id="chat-mensagens">
          ${msgs.map(m => {
            const enviada = m.remetente_id === utilizador.id;
            return `<div class="msg ${enviada ? 'msg-enviada' : 'msg-recebida'}">${m.mensagem}<div class="msg-hora">${hora(m.data_envio)}</div></div>`;
          }).join('')}
        </div>
        <div class="chat-input-area">
          <input type="text" id="input-msg" placeholder="Escrever mensagem..." onkeydown="if(event.key==='Enter') enviar()">
          <button class="btn-enviar" onclick="enviar()"><i class="bx bx-send"></i></button>
        </div>`;
      const m = document.getElementById('chat-mensagens');
      m.scrollTop = m.scrollHeight;
    }

    async function enviar() {
      const input = document.getElementById('input-msg');
      const texto = input.value.trim();
      if (!texto || !outroIdAtivo) return;
      input.value = '';
      await fetch(`${BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ destinatario_id: outroIdAtivo, mensagem: texto })
      });
      const msgs = document.getElementById('chat-mensagens');
      msgs.innerHTML += `<div class="msg msg-enviada">${texto}<div class="msg-hora">${new Date().toLocaleTimeString('pt',{hour:'2-digit',minute:'2-digit'})}</div></div>`;
      msgs.scrollTop = msgs.scrollHeight;
    }

    carregarConversas();
  </script>
</body>
</html>
