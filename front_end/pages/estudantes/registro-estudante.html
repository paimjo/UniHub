<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Estudante | UniHub</title>
  <link rel="stylesheet" href="../../css/style.css" />
</head>

<body>
  <section class="fundo-registro">
    <div class="caixa-registro">
      <img src="../../imagens/unihub-logo.jpg" alt="UniHub Logo" class="registro-logo">

      <div class="form-etapa etapa-1 ativa">
        <h2>Crie a sua conta</h2>
        <form>
          <div class="caixa-input"><input type="text" required><label>Nome Completo</label></div>
          <div class="caixa-input"><input type="email" required><label>Email Universitário</label></div>
          <div class="caixa-input"><input type="password" required><label>Palavra‑passe</label></div>
          <div class="caixa-input"><input type="password" required><label>Confirmar Palavra‑passe</label></div>
          <button type="button" class="btn proxima">Continuar</button>
        </form>
      </div>

      <div class="form-etapa etapa-2">
        <h2>Informações Pessoais</h2>
        <form>
          <div class="caixa-input"><input type="date" required><label>Data de Nascimento</label></div>
          <div class="caixa-input"><input type="text" required><label>Nacionalidade</label></div>
          <div class="caixa-input"><input type="text" required><label>N.º Documento de Identificação</label></div>
          <div class="caixa-input"><input type="tel" required><label>Contacto</label></div>
          <div class="caixa-input"><input type="text" required><label>Morada</label></div>
          <button type="button" class="btn proxima">Continuar</button>
          <button type="button" class="btn voltar">Voltar</button>
        </form>
      </div>

      <div class="form-etapa etapa-3">
        <h2>Informações Académicas</h2>
        <form action="home-estudante.html">
          <div class="caixa-input"><input type="text" required><label>Instituição de Ensino</label></div>
          <div class="caixa-input"><input type="text" required><label>Curso</label></div>
          <div class="caixa-input">
            <p class="titulo-select">Já concluiu a licenciatura?</p>
              <select id="licenciatura-concluida" required>
                <option value="">Selecione</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
              </select>
          </div>
          <div class="caixa-input" id="data-conclusao-box" style="display: none;"><input type="date"><label>Data prevista de conclusão</label></div>
          <div class="botoes-navegação">
            <button type="submit" class="btn finalizar">Concluir Registro</button>
            <button type="button" class="btn voltar">Voltar</button>
          </div>
        </form>
      </div>
      <div class="voltar-link">
        <p><a href="../index.html">⟵ Voltar à página inicial</a></p>
      </div>
    </div>
  </section>

  <footer class="rodape">
    <p>Copyright © 2026 UniHub. Todos os direitos reservados.</p>
  </footer>

  <script src="../../js/registro-estudante.js"></script>
</body>
</html>
